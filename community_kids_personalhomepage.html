<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Personal Homepage</title>
    <link rel="stylesheet" href="css/community_kids_personalhomepage.css">
</head>

<body>

<header>
    <nav>
        <div class="logo">
            <h1>Learning with Games</h1>
        </div>

        <a href="community.html" class="back-btn">← Back</a>
    </nav>
</header>

<main class="kids-container">

    <!-- 顶部资料 -->
    <section class="kids-profile">

        <!-- 点击头像 -->
        <img id="kidsAvatar"
             src="https://i.pravatar.cc/120?img=5"
             class="avatar-large"
             onclick="editKidsProfile()">

        <!-- 点击名字 -->
        <h2 id="kidsName" onclick="editKidsProfile()">Little Learner</h2>

        <p>Keep Growing Every Day!</p>

        <div class="stats">

            <div class="stat-card">
                <strong id="starCount">0</strong>
                <span>Stars</span>
            </div>

            <div class="stat-card">
                <strong>#1</strong>
                <span>Rank</span>
            </div>

            <div class="stat-card">
                <strong>👑</strong>
                <span>Hero</span>
            </div>

        </div>

    </section>

    <!-- 内容区 -->
    <section class="kids-grid">

        <div class="kids-box">
            <h3>📚 My Learning Posts</h3>
            <div id="kidsPosts"></div>
        </div>

        <div class="kids-box">
            <h3>🎖 Achievements</h3>

            <div class="badge">⭐ First Share</div>
            <div class="badge">🌟 5 Stars</div>
            <div class="badge">👑 Super Learner</div>

            <h3 style="margin-top:20px;">Today Progress</h3>

            <div class="progress">
                <div class="fill" id="progressFill"></div>
            </div>

        </div>

    </section>

</main>

<script src="js/community_kids_personalhomepage.js"></script>

</body>
</html>
