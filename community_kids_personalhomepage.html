<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Personal Homepage</title>
    <link rel="stylesheet" href="css/community_kids_personalhomepage.css">

    <style>
        .top-tools{
            background:#fff;
            border-bottom:1px solid #eee;
            padding:10px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
        }

        .breadcrumb{
            font-size:14px;
            color:#666;
        }

        .tool-right{
            display:flex;
            gap:8px;
        }

        .tool-btn{
            padding:6px 10px;
            border:none;
            border-radius:8px;
            background:#fff;
            box-shadow:0 2px 6px rgba(0,0,0,.08);
            cursor:pointer;
        }

        .font-btn{ width:40px; }
    </style>

</head>

<body>

<!-- ===== 新增工具栏 ===== -->
<div class="top-tools">
    <div class="breadcrumb" id="breadcrumb">
        Home > Kids Profile
    </div>

    <div class="tool-right">
        <button class="tool-btn" onclick="switchLang()" id="langBtn">中文</button>
        <button class="tool-btn font-btn" onclick="changeFont(-1)">A-</button>
        <button class="tool-btn font-btn" onclick="changeFont(0)">A</button>
        <button class="tool-btn font-btn" onclick="changeFont(1)">A+</button>
    </div>
</div>

<header>
    <nav>
        <div class="logo">
            <h1>Learning with Games</h1>
        </div>

        <a href="community.html" class="back-btn">← Back</a>
    </nav>
</header>

<main class="kids-container">

    <section class="kids-profile">

        <img id="kidsAvatar"
             src="https://i.pravatar.cc/120?img=5"
             class="avatar-large"
             onclick="editKidsProfile()">

        <h2 id="kidsName" onclick="editKidsProfile()">Little Learner</h2>

        <p>Keep Growing Every Day!</p>

        <div class="stats">

            <div class="stat-card">
                <strong id="starCount">0</strong>
                <span>Stars</span>
            </div>

            <div class="stat-card">
                <strong>#1</strong>
                <span>Rank</span>
            </div>

            <div class="stat-card">
                <strong>👑</strong>
                <span>Hero</span>
            </div>

        </div>

    </section>

    <section class="kids-grid">

        <div class="kids-box">
            <h3>📚 My Learning Posts</h3>
            <div id="kidsPosts"></div>
        </div>

        <div class="kids-box">
            <h3>🎖 Achievements</h3>

            <div class="badge">⭐ First Share</div>
            <div class="badge">🌟 5 Stars</div>
            <div class="badge">👑 Super Learner</div>

            <h3 style="margin-top:20px;">Today Progress</h3>

            <div class="progress">
                <div class="fill" id="progressFill"></div>
            </div>

        </div>

    </section>

</main>

<script src="js/community_kids_personalhomepage.js"></script>

</body>
</html>
