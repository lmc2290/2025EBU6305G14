<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Homepage</title>
  <link rel="stylesheet" href="css/community_personalhomepage.css">

  <style>
    .top-tools{
        background:#fff;
        border-bottom:1px solid #eee;
        padding:10px 20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        flex-wrap:wrap;
    }

    .breadcrumb{
        font-size:14px;
        color:#666;
    }

    .tool-right{
        display:flex;
        gap:8px;
    }

    .tool-btn{
        padding:6px 10px;
        border:none;
        border-radius:8px;
        background:#fff;
        box-shadow:0 2px 6px rgba(0,0,0,.08);
        cursor:pointer;
    }

    .font-btn{ width:40px; }
  </style>

</head>

<body>

<!-- ===== 工具栏 ===== -->
<div class="top-tools">

  <div class="breadcrumb" id="breadcrumb">
    Home > Personal Profile
  </div>

  <div class="tool-right">
    <button class="tool-btn" onclick="switchLang()" id="langBtn">中文</button>
    <button class="tool-btn font-btn" onclick="changeFont(-1)">A-</button>
    <button class="tool-btn font-btn" onclick="changeFont(0)">A</button>
    <button class="tool-btn font-btn" onclick="changeFont(1)">A+</button>
  </div>

</div>

<header>
  <nav>
    <div class="logo">
      <h1>Learning with Games</h1>
    </div>

    <div class="nav-right">
      <a href="community.html" class="back-btn">← Back</a>
      <button class="btn" onclick="toggleDarkMode()">🌙</button>
    </div>
  </nav>
</header>

<main class="profile-container">

  <section class="profile-card">

    <img id="profileAvatar"
         src="https://i.pravatar.cc/120?img=3"
         class="avatar-large clickable"
         onclick="changeAvatar()">

    <input type="file" id="avatarUpload" style="display:none" onchange="uploadAvatar(event)">

    <h2 id="profileName" class="clickable" onclick="changeName()">Your Name</h2>

    <p>Level 5 Learner</p>

    <div class="stats">

      <div class="stat-box">
        <strong id="postCount">0</strong>
        <span>Posts</span>
      </div>

      <div class="stat-box">
        <strong id="likeCount">0</strong>
        <span>Likes</span>
      </div>

      <div class="stat-box">
        <strong>#2</strong>
        <span>Rank</span>
      </div>

    </div>

  </section>

  <section class="grid-layout">

    <div class="content-box">
      <h3>📝 My Posts</h3>
      <div id="myPosts"></div>
    </div>

    <div class="content-box">
      <h3>🏆 Achievements</h3>

      <div class="badge">🥇 Top Contributor</div>
      <div class="badge">👍 10 Likes Club</div>
      <div class="badge">📝 First Post</div>
      <div class="badge">📷 Shared Images</div>

    </div>

  </section>

</main>

<script src="js/community_personalhomepage.js"></script>
</body>
</html>
