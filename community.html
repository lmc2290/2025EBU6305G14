<!-- community.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community</title>
    <link rel="stylesheet" href="css/community.css">
</head>

<body>

<header>
    <nav>
        <div class="logo">
            <h1>Learning with Games</h1>
        </div>

        <ul class="nav-links">
            <li><a href="homepage.html">Home</a></li>
            <li><a href="learning.html">Learning</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="test.html">Tests</a></li>
            <li><a href="community.html" class="active">Community</a></li>
        </ul>

        <div class="nav-right">
            <button class="btn btn-secondary" onclick="toggleDarkMode()">🌙</button>
        </div>
    </nav>
</header>

<main class="community-container">

    <section class="posts-section">

        <div class="top-bar">
            <h2>Explore Posts</h2>
            <input type="text" id="searchInput" placeholder="Search posts..." onkeyup="searchPosts()">
        </div>

        <div class="posts-scroll" id="postList"></div>

    </section>

    <section class="user-section">

        <div class="user-box">
            <div class="user-info">
                <img src="https://i.pravatar.cc/80?img=3" class="avatar big-avatar">
                <div>
                    <h3>Your Name</h3>
                    <p>Level 5 Learner</p>
                </div>
            </div>

            <button class="btn btn-primary full-btn" onclick="openModal()">+ New Post</button>
        </div>

        <div class="side-card">
            <h3>Your Posts</h3>
            <div id="myPosts"></div>
        </div>

    </section>

</main>

<!-- MODAL -->
<div class="modal" id="postModal">
    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <h3>Create Post</h3>

        <input id="postTitle" placeholder="Title">
        <textarea id="postContent" placeholder="Write something..."></textarea>

        <input type="file" id="postImage" accept="image/*">

        <button class="btn btn-primary full-btn" onclick="addPost()">Post</button>

    </div>
</div>

<div id="toast"></div>

<script src="js/community.js"></script>
</body>
</html>
