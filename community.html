<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community</title>
    <link rel="stylesheet" href="community.css">
</head>

<body>

<header>
    <nav>
        <div class="logo"><h1>Learning with Games</h1></div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="learning.html">Learning</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="test.html">Tests</a></li>
            <li><a href="community.html" class="active">Community</a></li>
        </ul>

        <div class="auth-buttons">
            <a href="#" class="btn btn-secondary">Login</a>
            <a href="#" class="btn btn-primary">Sign Up</a>
        </div>
    </nav>
</header>

<main class="community-container">

    <section class="posts-section">
        <h2>Explore Posts</h2>
        <div class="posts-scroll" id="postList"></div>
    </section>

    <section class="user-section">
        <div class="user-header">

            <div class="user-info" onclick="openProfile()">
                <img src="https://i.pravatar.cc/40?img=3" class="avatar">
                <h3>Your Name</h3>
            </div>

            <button class="btn btn-primary" onclick="openModal()">+ New Post</button>
        </div>

        <div id="myPosts">
            <h4>Your Posts</h4>
        </div>
    </section>

</main>


<div id="postModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>Create Post</h3>

        <input placeholder="Title">
        <textarea placeholder="Write something..."></textarea>


        <button class="btn btn-primary" onclick="closeModal()">Post</button>
    </div>
</div>


<div id="profilePage" class="profile-page">
    <button class="btn btn-secondary" onclick="closeProfile()">← Back</button>
    <h2>Your Profile</h2>

    <button class="btn btn-primary" onclick="openModal()">+ New Post</button>

    <div id="profilePosts"></div>
</div>

<script>


    let posts = [];
    for(let i=1;i<=20;i++){
        posts.push({
            title: "Post " + i,
            content: "This is content of post " + i,
            likes: 0,
            comments: []
        });
    }

    function renderPosts() {
        const list = document.getElementById("postList");
        const my = document.getElementById("myPosts");
        const profile = document.getElementById("profilePosts");

        list.innerHTML = "";
        my.innerHTML = "<h4>Your Posts</h4>";
        profile.innerHTML = "";

        posts.forEach((p, i) => {

            list.innerHTML += `
            <div class="post-card">
                <div class="post-header">
                    <img src="https://i.pravatar.cc/40?img=${i}" class="avatar">
                    <span>Your Name</span>
                </div>

                <h4>${p.title}</h4>
                <p>${p.content}</p>

                <button onclick="likePost(${i})">👍 ${p.likes}</button>

                <div class="comments">
                    ${p.comments.map(c=>`<div class="comment">${c}</div>`).join("")}
                    <input placeholder="Write comment..." onkeypress="addComment(event, ${i})">
                </div>
            </div>
            `;

            my.innerHTML += `<div class="user-post-card">${p.title}</div>`;
            profile.innerHTML += `<div class="user-post-card">${p.title}</div>`;
        });
    }


    function likePost(i){
        posts[i].likes++;
        renderPosts();
    }

    function addComment(e, i){
        if(e.key==="Enter"){
            posts[i].comments.push(e.target.value);
            renderPosts();
        }
    }

    function openModal(){
        document.getElementById('postModal').style.display='flex';
    }
    function closeModal(){
        document.getElementById('postModal').style.display='none';
    }

    function openProfile(){
        document.querySelector('.community-container').style.display='none';
        document.getElementById('profilePage').style.display='block';
    }
    function closeProfile(){
        document.querySelector('.community-container').style.display='flex';
        document.getElementById('profilePage').style.display='none';
    }

    renderPosts();

</script>

</body>
</html>
